<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FROGGY MATH JUMP - POND EDITION</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700;800;900&display=swap');

        :root {
            --bg-color: #15a1d1;
            --primary: #05c46b;
            --danger: #ff3f34;
            --warning: #ffdd59;
            --ui-bg: rgba(255, 255, 255, 0.98);
        }

        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            margin: 0;
            padding: 0;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #0b3d4d;
            font-family: 'Nunito', sans-serif;
            touch-action: none;
        }

        #gameCanvas {
            display: block;
            width: 100%;
            height: 100%;
            background-color: var(--bg-color);
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: rgba(11, 61, 77, 0.8);
            z-index: 100;
            backdrop-filter: blur(10px);
        }

        .hidden { display: none !important; }

        .panel {
            background: var(--ui-bg);
            padding: 30px;
            border-radius: 40px;
            text-align: center;
            box-shadow: 0 30px 60px rgba(0,0,0,0.4);
            border: 10px solid #fff;
            max-width: 90%;
            width: 460px;
            animation: bounceIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes bounceIn {
            0% { transform: scale(0.7); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* Container Judul dengan Katak */
        .title-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
        }

        .frog-logo {
            width: 60px;
            height: 60px;
            animation: hop 0.8s infinite ease-in-out;
        }

        @keyframes hop {
            0%, 100% { transform: translateY(0) scaleX(1.1); }
            50% { transform: translateY(-20px) scaleX(0.9); }
        }

        .game-title {
            font-family: 'Fredoka One', cursive;
            font-size: 2.2rem;
            color: var(--primary);
            text-shadow: 3px 3px 0px #059653, -1px -1px 0px #fff, 1px -1px 0px #fff, -1px 1px 0px #fff, 1px 1px 0px #fff;
        }

        .level-selector {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            background: #f1f2f6;
            padding: 8px;
            border-radius: 20px;
        }

        .level-btn {
            flex: 1;
            padding: 12px;
            border-radius: 15px;
            border: none;
            font-family: 'Fredoka One', cursive;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.3s;
            background: transparent;
            color: #7f8c8d;
        }

        .level-btn.active {
            background: white;
            color: var(--primary);
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .btn {
            display: block;
            width: 100%;
            padding: 16px;
            margin: 10px 0;
            font-size: 1.3rem;
            font-family: 'Fredoka One', cursive;
            color: white;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            box-shadow: 0 6px 0px rgba(0,0,0,0.15);
            transition: 0.1s;
        }

        .btn-solo { background: linear-gradient(to bottom, #05c46b, #059653); }
        .btn-duel { background: linear-gradient(to bottom, #0fbcf9, #0984e3); }
        .btn-squad { background: linear-gradient(to bottom, #ffa502, #e67e22); }
        .btn-restart { background: #ff3f34; margin-top: 20px; }

        #topUI {
            position: absolute;
            top: 15px;
            right: 15px;
            z-index: 150;
            display: flex;
            gap: 10px;
        }

        .icon-btn {
            width: 45px;
            height: 45px;
            background: white;
            border: 3px solid #1e272e;
            border-radius: 12px;
            font-size: 1.2rem;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 3px 0 #1e272e;
        }
    </style>
</head>
<body>

    <canvas id="gameCanvas"></canvas>

    <div id="topUI">
        <button id="btnHome" class="icon-btn">🏠</button>
        <button id="btnAudio" class="icon-btn">🔊</button>
    </div>

    <div id="mainMenu" class="overlay">
        <div class="panel">
            <div class="title-container">
                <img src="https://i.imgur.com/GvlmIVI.png" alt="Frog Logo" class="frog-logo">
                <div class="game-title">Froggy Math Jump</div>
            </div>
            
            <p style="font-weight: 800; color: #7f8c8d; margin-bottom: 8px; font-size: 0.9rem;">TINGKAT KESULITAN:</p>
            <div class="level-selector">
                <button id="lvlEasy" class="level-btn active" onclick="setLevel('easy')">MUDAH (×)</button>
                <button id="lvlHard" class="level-btn" onclick="setLevel('hard')">SUSAH (× ÷)</button>
            </div>

            <button class="btn btn-solo" onclick="startGame(1)">🎮 SOLO</button>
            <button class="btn btn-duel" onclick="startGame(2)">⚔️ DUEL</button>
            <button class="btn btn-squad" onclick="startGame(4)">🏆 SQUAD</button>
        </div>
    </div>

    <div id="gameOver" class="overlay hidden">
        <div class="panel">
            <h1 style="font-family: 'Fredoka One'; font-size: 2.5rem; color: #ff3f34; margin-bottom: 15px; text-transform: uppercase;">Game Over</h1>
            <div id="winnerList" style="margin-bottom: 20px;"></div>
            <button class="btn btn-restart" onclick="showMenu()">MAIN LAGI</button>
        </div>
    </div>

<script>
/**
 * ASET GAMBAR
 */
const frogImg = new Image();
frogImg.src = "https://i.imgur.com/GvlmIVI.png";

const koiImg = new Image();
koiImg.src = "https://i.imgur.com/I5tvXI4.png";

/**
 * AUDIO ENGINE
 */
const AudioEngine = (() => {
    let ctx = null;
    let muted = false;
    const init = () => { if(!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)(); if(ctx.state === 'suspended') ctx.resume(); };
    const tone = (f, t, d, v=0.1) => {
        if(muted || !ctx) return;
        const o = ctx.createOscillator();
        const g = ctx.createGain();
        o.type = t; o.frequency.setValueAtTime(f, ctx.currentTime);
        g.gain.setValueAtTime(v, ctx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + d);
        o.connect(g); g.connect(ctx.destination);
        o.start(); o.stop(ctx.currentTime + d);
    };
    return {
        init,
        playJump: () => tone(450, 'sine', 0.1, 0.05),
        playOk: (c=0) => { tone(600 + (c*20), 'sine', 0.1, 0.08); },
        playFail: () => tone(80, 'sawtooth', 0.6, 0.15),
        playWin: () => { [523, 659, 783, 1046].forEach((f,i) => setTimeout(() => tone(f, 'square', 0.4, 0.05), i*120)); },
        toggle: () => { muted = !muted; init(); return !muted; }
    };
})();

/**
 * POND ANIMATION ELEMENTS
 */
class KoiFish {
    constructor(canvasWidth, canvasHeight) {
        this.cw = canvasWidth;
        this.ch = canvasHeight;
        this.reset();
    }
    
    reset() {
        this.x = Math.random() * this.cw;
        this.y = Math.random() * this.ch;
        this.angle = Math.random() * Math.PI * 2;
        this.targetAngle = this.angle;
        this.velocity = 0.5 + Math.random();
        this.size = 28 + Math.random() * 18;
        this.turnSpeed = 0.02 + Math.random() * 0.03;
        this.wiggling = 0;
        this.wiggleSpeed = 0.1 + Math.random() * 0.1;
    }

    update(playing) {
        if (Math.random() < 0.01) {
            this.targetAngle += (Math.random() - 0.5) * Math.PI * 0.5;
        }

        let angleDiff = this.targetAngle - this.angle;
        while (angleDiff > Math.PI) angleDiff -= Math.PI * 2;
        while (angleDiff < -Math.PI) angleDiff += Math.PI * 2;
        this.angle += angleDiff * this.turnSpeed;

        const margin = 100;
        if (this.x < margin) this.targetAngle = 0;
        if (this.x > this.cw - margin) this.targetAngle = Math.PI;
        if (this.y < margin) this.targetAngle = Math.PI / 2;
        if (this.y > this.ch - margin) this.targetAngle = -Math.PI / 2;

        const baseSpeed = playing ? 1.8 : 0.8;
        this.x += Math.cos(this.angle) * this.velocity * baseSpeed;
        this.y += Math.sin(this.angle) * this.velocity * baseSpeed;

        this.wiggling += this.wiggleSpeed * (playing ? 2 : 1);
    }

    draw(ctx) {
        ctx.save();
        ctx.translate(this.x, this.y);
        const wiggleEffect = Math.sin(this.wiggling) * 0.12;
        ctx.rotate(this.angle + Math.PI / 2 + wiggleEffect);
        ctx.globalAlpha = 0.5;
        if (koiImg.complete) {
            ctx.shadowBlur = 15;
            ctx.shadowColor = "rgba(0,0,0,0.3)";
            ctx.shadowOffsetY = 10;
            ctx.drawImage(koiImg, -this.size / 2, -this.size / 2, this.size, this.size);
        } else {
            ctx.fillStyle = '#ff793f';
            ctx.beginPath(); ctx.ellipse(0, 0, this.size / 2, this.size / 4, 0, 0, Math.PI * 2); ctx.fill();
        }
        ctx.restore();
    }
}

class RainDrop {
    constructor(cw, ch) {
        this.cw = cw; this.ch = ch;
        this.reset();
    }
    reset() {
        this.x = Math.random() * this.cw;
        this.y = -50;
        this.targetY = Math.random() * this.ch;
        this.speed = 15 + Math.random() * 15;
    }
    update(ripples, playing) {
        if (!playing) return;
        this.y += this.speed;
        if(this.y >= this.targetY) {
            ripples.push(new Ripple(this.x, this.y, 0.3, 1));
            this.reset();
        }
    }
    draw(ctx, playing) {
        if (!playing) return;
        ctx.strokeStyle = 'rgba(255,255,255,0.15)';
        ctx.lineWidth = 1;
        ctx.beginPath(); ctx.moveTo(this.x, this.y); ctx.lineTo(this.x, this.y + 12); ctx.stroke();
    }
}

class Ripple {
    constructor(x, y, maxAlpha = 0.5, speed = 1.8) {
        this.x = x; this.y = y;
        this.r = 0;
        this.alpha = maxAlpha;
        this.maxAlpha = maxAlpha;
        this.speed = speed;
        this.active = true;
    }
    update() {
        this.r += this.speed;
        this.alpha -= 0.015;
        if(this.alpha <= 0) this.active = false;
    }
    draw(ctx) {
        ctx.save();
        ctx.strokeStyle = `rgba(255,255,255,${this.alpha})`;
        ctx.lineWidth = 2;
        ctx.beginPath(); ctx.ellipse(this.x, this.y, this.r, this.r/2.5, 0, 0, Math.PI*2); ctx.stroke();
        ctx.restore();
    }
}

/**
 * GAME CORE
 */
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
let gameInstances = [];
let koiFish = [];
let rainDrops = [];
let ripples = [];
let isPlaying = false;
let lastTime = 0;
let timeGlobal = 0;
let currentDifficulty = 'easy';

function setLevel(lvl) {
    currentDifficulty = lvl;
    document.getElementById('lvlEasy').classList.toggle('active', lvl === 'easy');
    document.getElementById('lvlHard').classList.toggle('active', lvl === 'hard');
}

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    if (koiFish.length === 0) {
        koiFish = Array.from({length: 12}, () => new KoiFish(canvas.width, canvas.height));
        rainDrops = Array.from({length: 10}, () => new RainDrop(canvas.width, canvas.height));
    } else {
        koiFish.forEach(k => { k.cw = canvas.width; k.ch = canvas.height; });
        rainDrops.forEach(d => { d.cw = canvas.width; d.ch = canvas.height; });
    }
    if(isPlaying) layout(gameInstances.length);
}
window.addEventListener('resize', resize);

function layout(count) {
    const w = canvas.width;
    const h = canvas.height;
    gameInstances.forEach((g, i) => {
        const colWidth = w / count;
        g.setBounds(i * colWidth, 0, colWidth, h);
        g.reset();
    });
}

function genMath() {
    const diffScale = Math.min(10, Math.floor(timeGlobal / 10));
    const useDivision = currentDifficulty === 'hard' && Math.random() > 0.5;
    if (useDivision) {
        const n1 = Math.floor(Math.random() * (5 + diffScale)) + 2;
        const ans = Math.floor(Math.random() * 9) + 2;
        const product = n1 * ans;
        let opts = [ans];
        while(opts.length < 4) {
            let w = ans + (Math.floor(Math.random() * 5) + 1) * (Math.random() > 0.5 ? 1 : -1);
            if(w > 0 && !opts.includes(w)) opts.push(w);
        }
        return { q: `${product} ÷ ${n1}`, a: ans, opts: opts.sort(() => Math.random() - 0.5) };
    } else {
        const n1 = Math.floor(Math.random() * (5 + diffScale)) + 2;
        const n2 = Math.floor(Math.random() * 9) + 1;
        const ans = n1 * n2;
        let opts = [ans];
        while(opts.length < 4) {
            let w = ans + (Math.floor(Math.random() * 10) + 1) * (Math.random() > 0.5 ? 1 : -1);
            if(w > 0 && !opts.includes(w)) opts.push(w);
        }
        return { q: `${n1} × ${n2}`, a: ans, opts: opts.sort(() => Math.random() - 0.5) };
    }
}

class PlayerGame {
    constructor(id) {
        this.id = id;
        this.score = 0;
        this.isDead = false;
        this.frog = { x: 0, y: 0, jumping: false, p: 0, scale: 1 };
        this.leaves = [];
        this.question = null;
        this.timer = 10; // Default awal 10 detik
    }
    setBounds(x, y, w, h) { this.bx = x; this.by = y; this.bw = w; this.bh = h; }
    reset() {
        this.baseX = this.bx + this.bw * 0.5;
        this.baseY = this.by + this.bh * 0.85;
        this.frog.x = this.baseX;
        this.frog.y = this.baseY;
        this.nextQuestion();
    }
    nextQuestion() {
        // Durasi 10 detik untuk Mudah, 7 detik untuk Susah
        this.timer = currentDifficulty === 'hard' ? 7 : 10; 
        this.question = genMath();
        this.leaves = [];
        const startY = this.by + this.bh * 0.35;
        const leafAreaH = this.bh * 0.4;
        for(let i=0; i<4; i++) {
            const colIdx = i % 2;
            const rowIdx = Math.floor(i / 2);
            this.leaves.push({
                x: this.bx + (this.bw * 0.3) + (colIdx * (this.bw * 0.4)),
                y: startY + (rowIdx * (leafAreaH / 2)),
                val: this.question.opts[i],
                swayOffset: Math.random() * Math.PI * 2
            });
        }
    }
    handleInput(tx, ty) {
        if(this.isDead || this.frog.jumping) return;
        if(tx < this.bx || tx > this.bx + this.bw || ty < this.by || ty > this.by + this.bh) return;
        const r = Math.min(30, this.bw * 0.35);
        let hit = this.leaves.find(l => Math.hypot(tx - l.x, ty - l.y) < r + 20);
        if(hit) {
            this.frog.jumping = true; this.frog.p = 0;
            this.frog.sx = this.frog.x; this.frog.sy = this.frog.y;
            this.frog.tx = hit.x; this.frog.ty = hit.y;
            this.frog.targetVal = hit.val;
            ripples.push(new Ripple(this.frog.x, this.frog.y, 0.4, 2));
            AudioEngine.playJump();
        }
    }
    update(dt) {
        if(this.isDead) return;
        this.timer -= dt;
        if(this.timer <= 0) { this.isDead = true; AudioEngine.playFail(); }
        if(this.frog.jumping) {
            this.frog.p += 0.12; 
            if(this.frog.p >= 1) {
                this.frog.jumping = false;
                this.frog.scale = 1;
                ripples.push(new Ripple(this.frog.tx, this.frog.ty, 0.8, 3));
                if(this.frog.targetVal === this.question.a) {
                    this.score += 10;
                    AudioEngine.playOk(this.score/10);
                    this.nextQuestion();
                } else {
                    this.isDead = true; AudioEngine.playFail();
                }
                this.frog.x = this.baseX; this.frog.y = this.baseY;
            } else {
                let p = this.frog.p;
                this.frog.x = this.frog.sx + (this.frog.tx - this.frog.sx) * p;
                const arcHeight = 120;
                this.frog.y = this.frog.sy + (this.frog.ty - this.frog.sy) * p - Math.sin(p * Math.PI) * arcHeight;
                this.frog.scale = 1 + Math.sin(p * Math.PI) * 0.4;
            }
        }
    }
    draw(ctx) {
        ctx.save();
        ctx.beginPath(); ctx.rect(this.bx, this.by, this.bw, this.bh); ctx.clip();
        if (this.isDead) { ctx.fillStyle = 'rgba(0,0,0,0.5)'; ctx.fillRect(this.bx, this.by, this.bw, this.bh); }
        const r = Math.min(32, this.bw * 0.3);
        
        const drawPad = (x, y, val, offset=0) => {
            const swayX = this.isDead ? 0 : Math.sin(timeGlobal + offset) * 5;
            const swayY = this.isDead ? 0 : Math.cos(timeGlobal * 0.8 + offset) * 3;
            ctx.fillStyle = 'rgba(0,0,0,0.15)';
            ctx.beginPath(); ctx.arc(x + 5 + swayX, y + 5 + swayY, r, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = this.isDead ? '#636e72' : '#2ecc71';
            ctx.beginPath(); ctx.arc(x + swayX, y + swayY, r, 0.4, Math.PI * 1.8); ctx.lineTo(x + swayX, y + swayY); ctx.fill();
            if(val) {
                ctx.fillStyle = '#fff'; ctx.font = `900 ${r*0.8}px Nunito`;
                ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; 
                ctx.fillText(val, x + swayX, y + swayY);
            }
        };

        drawPad(this.baseX, this.baseY, null, 0);
        if(!this.isDead) this.leaves.forEach(l => drawPad(l.x, l.y, l.val, l.swayOffset));

        ctx.save();
        ctx.translate(this.frog.x, this.frog.y);
        if(this.isDead) { ctx.scale(1, -1); ctx.globalAlpha = 0.7; } 
        else { ctx.scale(this.frog.scale, this.frog.scale); }
        
        const frogSize = r * 2.2;
        if (frogImg.complete) {
            if(this.frog.jumping) {
                ctx.shadowBlur = 20;
                ctx.shadowColor = "rgba(0,0,0,0.4)";
                ctx.shadowOffsetY = 30 * (this.frog.scale - 1);
            }
            ctx.drawImage(frogImg, -frogSize/2, -frogSize/2, frogSize, frogSize);
        } else {
            ctx.fillStyle = '#27ae60';
            ctx.beginPath(); ctx.ellipse(0, 0, r*0.7, r*0.6, 0, 0, Math.PI*2); ctx.fill();
        }
        ctx.restore();

        if(!this.isDead) {
            ctx.fillStyle = '#fff'; ctx.textAlign = 'center';
            ctx.font = `900 ${Math.min(18, this.bw*0.12)}px Nunito`;
            ctx.fillText(`P${this.id} Skor: ${this.score}`, this.bx + this.bw/2, this.by + 35);
            const boxW = this.bw * 0.85; const boxH = 55; const boxX = this.bx + (this.bw - boxW)/2; const boxY = this.by + 60;
            ctx.fillStyle = 'rgba(255,255,255,0.92)'; ctx.beginPath(); ctx.roundRect(boxX, boxY, boxW, boxH, 15); ctx.fill();
            ctx.fillStyle = '#2c3e50'; ctx.font = `900 ${Math.min(26, this.bw*0.2)}px Fredoka One`;
            ctx.fillText(this.question.q, this.bx + this.bw/2, boxY + boxH/2 + 8);
            ctx.fillStyle = 'rgba(0,0,0,0.1)'; ctx.fillRect(boxX, boxY + boxH + 8, boxW, 6);
            
            // Indikator visual timer
            const timerMax = currentDifficulty === 'hard' ? 7 : 10;
            ctx.fillStyle = this.timer < 2 ? '#ff3f34' : '#2ecc71'; 
            ctx.fillRect(boxX, boxY + boxH + 8, boxW * (this.timer/timerMax), 6);
        }
        ctx.restore();
    }
}

function startGame(count) {
    AudioEngine.init();
    gameInstances = Array.from({length: count}, (_, i) => new PlayerGame(i+1));
    isPlaying = true; timeGlobal = 0; layout(count);
    document.getElementById('mainMenu').classList.add('hidden');
    document.getElementById('gameOver').classList.add('hidden');
    lastTime = performance.now();
}

function loop(t) {
    const dt = (t - lastTime)/1000;
    lastTime = t; timeGlobal += dt;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    const waterGrad = ctx.createRadialGradient(canvas.width/2, canvas.height/2, 10, canvas.width/2, canvas.height/2, canvas.width);
    waterGrad.addColorStop(0, isPlaying ? '#15a1d1' : '#0e6d8f');
    waterGrad.addColorStop(1, '#0b3d4d');
    ctx.fillStyle = waterGrad; ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    ripples = ripples.filter(r => r.active);
    ripples.forEach(r => { r.update(); r.draw(ctx); });
    
    koiFish.forEach(k => { k.update(isPlaying); k.draw(ctx); });
    
    rainDrops.forEach(d => { d.update(ripples, isPlaying); d.draw(ctx, isPlaying); });
    
    if(isPlaying) {
        let anyAlive = false;
        gameInstances.forEach(g => { g.update(dt); g.draw(ctx); if(!g.isDead) anyAlive = true; });
        if(!anyAlive) { isPlaying = false; setTimeout(endGame, 1000); }
    }
    requestAnimationFrame(loop);
}

function endGame() {
    const list = document.getElementById('winnerList');
    list.innerHTML = gameInstances.sort((a,b)=>b.score-a.score).map((p,i)=>`
        <div class="player-row ${i===0?'winner':''}" style="background: #f1f2f6; padding: 12px 20px; border-radius: 15px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; font-weight: 900;">
            <span>${i===0?'🥇':''} PEMAIN ${p.id}</span>
            <span style="font-family: 'Fredoka One'; color: #2d3436; font-size: 1.4rem;">${p.score}</span>
        </div>
    `).join('');
    document.getElementById('gameOver').classList.remove('hidden');
    AudioEngine.playWin();
}

function showMenu() {
    isPlaying = false;
    document.getElementById('mainMenu').classList.remove('hidden');
    document.getElementById('gameOver').classList.add('hidden');
}

canvas.addEventListener('mousedown', e => {
    if(!isPlaying) return;
    gameInstances.forEach(g => g.handleInput(e.clientX, e.clientY));
});
canvas.addEventListener('touchstart', e => {
    if(!isPlaying) return;
    Array.from(e.changedTouches).forEach(t => gameInstances.forEach(g => g.handleInput(t.clientX, t.clientY)));
}, {passive: false});

document.getElementById('btnHome').onclick = showMenu;
document.getElementById('btnAudio').onclick = (e) => { e.target.innerText = AudioEngine.toggle() ? "🔊" : "🔇"; };

resize();
requestAnimationFrame(loop);
</script>
</body>
</html>
